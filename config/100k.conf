# Triangle GA — 100k generation run
#
# Lines starting with # are comments. Blank lines are ignored.
# Format: KEY = value  (whitespace around = is optional)
# All parameters are loaded at runtime — no recompilation needed.

RUN_PREFIX = run100k

# Number of triangles used to approximate the image.
N_TRIANGLES = 200

# Number of chromosomes in the population.
POP_SIZE = 30

# Slots replaced per generation. 0 = auto (ceil(POP_SIZE * 0.75)).
DISC_COUNT = 0

# Run for exactly 100 000 generations, stagnation disabled.
MAX_GENERATIONS = 100000

# Ignored when MAX_GENERATIONS > 0.
STAGNATION_GENS = 0

# Stagnation mode: 0 = absolute threshold, 1 = relative threshold.
STAGNATION_RELATIVE = 0

# Minimum raw improvement to reset the stagnation counter (absolute mode).
STAGNATION_ABS_TOL = 1e-7

# Minimum fractional improvement to reset the stagnation counter (relative mode).
STAGNATION_REL_TOL = 1e-4

# Probability a discarded slot gets crossover vs mutation.
CROSSOVER_PROB = 0.95

# Fixed alpha (transparency) for every triangle. Not mutated.
ALPHA_INIT = 0.15

# Save a side-by-side PPM snapshot every N generations.
VISUALISE_EVERY = 10000
