# Weak scaling — 1 node, 4 GPUs  (x4 image, 100k gens/island)
# sbatch --nodes=1 --ntasks-per-node=1 --gres=gpu:4 run.sbatch config/weak_scaling_1n4g.conf

RUN_PREFIX = weak-1n4g

TARGET_FILE = input/target_area_x4.ppm

N_TRIANGLES = 300
POP_SIZE = 100
DISC_COUNT = 0
MAX_GENERATIONS = 100000
STAGNATION_GENS = 0
STAGNATION_RELATIVE = 0
STAGNATION_ABS_TOL = 1e-7
STAGNATION_REL_TOL = 1e-4
CROSSOVER_PROB = 0.95
ALPHA_INIT = 0.15
LOSS_TYPE = mse
WMSE_POWER = 1
NUM_GPUS = 0
MIGRATION_INTERVAL = 0
MIGRATION_SIZE = 1
VISUALISE_EVERY = 10000
