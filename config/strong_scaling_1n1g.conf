CROSSOVER_PROB = 0.95
ALPHA_INIT = 0.15
LOSS_TYPE = mse
WMSE_POWER = 1
NUM_GPUS = 0
MIGRATION_INTERVAL = 0
MIGRATION_SIZE = 1
VISUALISE_EVERY = 10000
