# Strong scaling — 1 node, 1 GPU  (total: 1 GPU, 1 island, 100k gens)
# sbatch --nodes=1 --ntasks-per-node=1 --gres=gpu:1 run.sbatch config/strong_scaling_1n1g.conf

RUN_PREFIX = strong-1n1g

TARGET_FILE = input/strong_scaling.ppm

N_TRIANGLES = 300
POP_SIZE = 100
DISC_COUNT = 0
MAX_GENERATIONS = 100000
STAGNATION_GENS = 0
STAGNATION_RELATIVE = 0
STAGNATION_ABS_TOL = 1e-7
