# Triangle GA — default configuration
#
# Lines starting with # are comments. Blank lines are ignored.
# Format: KEY = value  (whitespace around = is optional)
# All parameters are loaded at runtime — no recompilation needed.

# Label prepended to the timestamped output folder name.
RUN_PREFIX = run

# Path to the target PPM image to approximate.
TARGET_FILE = input/target.ppm

# Number of triangles used to approximate the image.
N_TRIANGLES = 200

# Number of chromosomes in the population.
POP_SIZE = 30

# Slots replaced per generation. 0 = auto (ceil(POP_SIZE * 0.75)).
DISC_COUNT = 0

# Hard generation limit. Set to 0 to run until stagnation only.
# When set > 0, the stagnation check is disabled entirely — the
# run goes for exactly this many generations.
MAX_GENERATIONS = 0

# Stop after this many consecutive generations with no improvement.
# Ignored when MAX_GENERATIONS > 0. Set to 0 to disable.
STAGNATION_GENS = 2000

# Stagnation mode: 0 = absolute threshold, 1 = relative threshold.
STAGNATION_RELATIVE = 0

# Minimum raw improvement to reset the stagnation counter (absolute mode).
STAGNATION_ABS_TOL = 1e-7

# Minimum fractional improvement to reset the stagnation counter (relative mode).
STAGNATION_REL_TOL = 1e-4

# Probability a discarded slot gets crossover vs mutation.
CROSSOVER_PROB = 0.95

# Fixed alpha (transparency) for every triangle. Not mutated.
ALPHA_INIT = 0.15

# Loss function used for fitness evaluation.
# Accepted values: string name OR numeric index (0 / 1 / 2).
#
#   0  mse  — Mean squared error: mean((pred-target)^2) per RGB channel.
#             Balanced; treats every pixel equally.  Default.
#
#   1  l4   — Quartic loss: mean((pred-target)^4) per RGB channel.
#             2× error → 16× cost (vs MSE's 4×).  Aggressively fixes the
#             worst pixels.  L4 values are much smaller; lower
#             STAGNATION_ABS_TOL (e.g. 1e-14) or use STAGNATION_RELATIVE=1.
#
#   2  ssim  — Per-channel RGB SSIM loss: 1 − mean(SSIM_R, SSIM_G, SSIM_B).
#              SSIM measures mean (luminance), variance (contrast), and
#              cross-covariance (structure) per 16×16 patch.  Applied to R, G,
#              and B independently so colour errors are penalised — luminance-
#              only SSIM lets the GA match brightness with wrong hues, giving
#              a colour-negative appearance.  Range [0, 2]; lower is better.
#
#   3  logll — Binary cross-entropy (log-likelihood) per RGB channel:
#              mean(-t*log(p+e) - (1-t)*log(1-p+e)) where p is the rendered
#              pixel value and t is the target.  More aggressive than MSE near
#              extremes: predicting 0.01 for target=1 costs ~4.6 nats vs
#              MSE's 0.96.  Use smaller STAGNATION_ABS_TOL (e.g. 1e-9) or
#              STAGNATION_RELATIVE=1 as values are in a different scale.
#
#   4  wmse  — Area-weighted MSE: MSE * (total_triangle_area)^WMSE_POWER.
#              Total area is the sum of triangle areas in normalised [0,1]^2
#              space (independent of image resolution; can exceed 1 when
#              triangles overlap).  Penalises large-triangle solutions and
#              encourages finer coverage.  WMSE_POWER tunes the strength:
#              0.5 (default) gives a square-root damping; 1.0 is linear.
LOSS_TYPE = mse

# Exponent for the area weight in LOSS_WMSE.
# weight = (total_normalised_triangle_area + 1e-7)^WMSE_POWER
# 0.5 (default): square-root damping — moderately penalises large triangles.
# 1.0: linear penalty.  0.0: weight = 1 (degenerates to pure MSE).
# Only used when LOSS_TYPE = wmse.
WMSE_POWER = 0.5

# Number of GPUs to use for parallel fitness evaluation.
# 0 = use all available GPUs. Set to 1 to disable multi-GPU.
NUM_GPUS = 0

# Save a side-by-side PPM snapshot every N generations.
VISUALISE_EVERY = 10000
